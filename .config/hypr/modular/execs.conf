# Execute your favorite apps at launch
# Assert GTK cursor matches the compositor (Future-cyan / 32) so it does not
# flip to a stale gsettings value when hovering GTK widgets (e.g. waybar)
exec-once = gsettings set org.gnome.desktop.interface cursor-theme Future-cyan-cursors
exec-once = gsettings set org.gnome.desktop.interface cursor-size 32
exec-once = ~/.config/hypr/xdg-portal-hyprland
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = awww-daemon
exec-once = ~/.config/hypr/scripts/waybar-loop.sh
#exec-once = mako
exec-once = swaync
exec-once = blueman-applet
exec-once = nm-applet --indicator
exec-once = wl-paste --watch cliphist store
exec = ~/.config/HyprV/hyprv_util setbg
exec-once = keepassxc % put sleep 3 in front in case it does not work
#exec-once = hyprpm reload
#exec-once = hypridle
#exec-once = hyprpaper
